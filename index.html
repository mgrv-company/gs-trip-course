<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맹그로브 고성 · 지금 갈만한 곳</title>
<meta name="description" content="맹그로브 고성 CA 추천 — 지금 문 연, 가까운, 안 붐비는 속초·고성 맛집과 카페">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/favicon-180.png">
<style>
  :root {
    --green: #1d5c4f; --green-light: #e8f2ef; --sand: #faf7f2;
    --ink: #243230; --gray: #7a8a86; --line: #e3e0d8; --key: #00b453;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Malgun Gothic', sans-serif;
    background: var(--sand); color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  .bg-rotator { position: fixed; inset: 0; z-index: -2; }
  .bg-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s; }
  .bg-slide.is-active { opacity: 1; }
  .bg-overlay { position: fixed; inset: 0; z-index: -1; background: rgba(237, 236, 233, 0.86); }
  @media (prefers-reduced-motion: reduce) { .bg-slide { transition: none; } }

  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }
  header { text-align: center; padding: 20px 0 6px; }
  header .badge { display: inline-block; background: var(--key); color: #fff; font-size: 11px; letter-spacing: 1px; padding: 4px 12px; border-radius: 99px; }
  header h1 { font-size: 24px; margin: 11px 0 4px; letter-spacing: -0.5px; }
  header .ctx { color: var(--gray); font-size: 13px; }

  .segs { display: flex; gap: 7px; margin-top: 18px; }
  .seg { flex: 1; text-align: center; padding: 10px 4px; border: 1.5px solid var(--line); background: #fff; border-radius: 12px; font-size: 13.5px; font-weight: 600; cursor: pointer; user-select: none; }
  .seg.on { border-color: var(--green); background: var(--green-light); color: var(--green); }

  .slotlabel { font-size: 15px; font-weight: 800; margin: 20px 2px 4px; }
  .slotsub { font-size: 12.5px; color: var(--gray); margin-bottom: 6px; }

  .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-top: 12px; position: relative; overflow: hidden; }
  .card.pic { padding-right: 108px; min-height: 112px; }
  .card .ph { position: absolute; right: 12px; top: 14px; width: 84px; height: 84px; border-radius: 12px; object-fit: cover; }
  .card .nm { font-weight: 800; font-size: 15.5px; }
  .card .ct { font-size: 12.5px; color: var(--gray); margin-top: 2px; }
  .card .ct .rv { color: #9a6b2f; margin-left: 4px; }
  .card .info { font-size: 12.5px; color: #4a5854; margin-top: 7px; line-height: 1.7; }
  .card .links { margin-top: 8px; }
  .card .links a { font-size: 12px; color: var(--green); text-decoration: none; border: 1px solid var(--line); border-radius: 8px; padding: 4px 9px; display: inline-block; }
  .b { font-size: 10.5px; padding: 1.5px 7px; border-radius: 99px; font-weight: 700; vertical-align: 2px; }
  .b.ca { background: var(--green-light); color: var(--green); }
  .b.rsv { background: #fdeaea; color: #b03a3a; }
  .b.open { background: #e7f7ee; color: #138a4e; }
  .b.chk { background: #fff4e0; color: #9a6b2f; }
  .empty { text-align: center; color: var(--gray); font-size: 14px; padding: 36px 10px; }

  /* 섹션 버튼 그리드 */
  .nav { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-top: 26px; }
  .navbtn { background: #fff; border: 1.5px solid var(--line); border-radius: 14px; padding: 16px 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 700; }
  .navbtn .ic { display: block; font-size: 22px; margin-bottom: 5px; }
  .navbtn .sub { display: block; font-size: 10.5px; color: var(--gray); font-weight: 500; margin-top: 2px; }

  /* 섹션 오버레이 */
  #section { display: none; position: fixed; inset: 0; background: var(--sand); z-index: 30; overflow-y: auto; }
  #section.show { display: block; }
  #section .shead { position: sticky; top: 0; background: var(--sand); display: flex; align-items: center; gap: 10px; padding: 16px; border-bottom: 1px solid var(--line); }
  #section .shead h2 { font-size: 17px; flex: 1; }
  #secClose { border: 0; background: #fff; border: 1.5px solid var(--line); border-radius: 10px; padding: 7px 12px; font-size: 14px; cursor: pointer; }
  #secBody { max-width: 480px; margin: 0 auto; padding: 6px 16px 50px; }

  footer { text-align: center; color: var(--gray); font-size: 11.5px; margin-top: 30px; }
  footer a { color: var(--gray); }
</style>
</head>
<body>
<div class="bg-rotator">
  <div class="bg-slide is-active" style="background-image:url('assets/goseong-hero-2.webp')"></div>
  <div class="bg-slide" style="background-image:url('assets/goseong-hero-3.webp')"></div>
  <div class="bg-slide" style="background-image:url('assets/goseong-hero-7.webp')"></div>
</div>
<div class="bg-overlay"></div>

<div class="wrap">
  <header>
    <span class="badge">MANGROVE 고성</span>
    <h1>지금 갈만한 곳</h1>
    <div class="ctx"><span id="ctxTime"></span> · CA가 직접 가본 곳</div>
  </header>

  <div class="segs">
    <div class="seg on" data-slot="auto">✨ 지금추천</div>
    <div class="seg" data-slot="meal">🍚 밥</div>
    <div class="seg" data-slot="cafe">☕ 카페</div>
    <div class="seg" data-slot="bar">🍻 술집</div>
  </div>

  <div class="slotlabel" id="slotLabel"></div>
  <div class="slotsub">지금 문 연 · 가까운 · 안 붐비는 순</div>
  <div id="nowList"></div>

  <div class="nav">
    <div class="navbtn" data-sec="takeout"><span class="ic">🍱</span>포장·배달<span class="sub">객실에서</span></div>
    <div class="navbtn" data-sec="activity"><span class="ic">🏄</span>액티비티<span class="sub">준비중</span></div>
    <div class="navbtn" data-sec="beach"><span class="ic">🏖</span>해수욕장<span class="sub">준비중</span></div>
    <div class="navbtn" data-sec="festival"><span class="ic">🎉</span>축제<span class="sub">준비중</span></div>
    <div class="navbtn" data-sec="course"><span class="ic">🗺</span>트립코스<span class="sub">추천 일정</span></div>
  </div>

  <footer>맹그로브 고성 · 속초·고성 로컬 정보 · <a href="course.html">트립 코스 짜기</a></footer>
</div>

<!-- 섹션 오버레이 -->
<div id="section">
  <div class="shead">
    <h2 id="secTitle"></h2>
    <button id="secClose">✕ 닫기</button>
  </div>
  <div id="secBody"></div>
</div>

<script src="places.js"></script>
<script src="home.js"></script>
</body>
</html>
