<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맹그로브 고성 · 강추 코스 조합</title>
<meta name="description" content="맹그로브 고성 CA 강력 추천 가게들로 만드는 반나절 코스">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --green: #00b453; --green-deep: #0a7a3c; --green-light: #eafdf1; --ink: #1f1e1d; --gray: #76776c; --line: #ececea; --bg: #f6f5f2; --soft: #edece9; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased; }
  .topbar { position: sticky; top: 0; z-index: 20; background: var(--ink); color: #fff; display: flex; align-items: center; gap: 10px; padding: 14px 16px; }
  .topbar .wm { font-weight: 800; font-size: 16px; letter-spacing: -0.3px; }
  .topbar .pg { font-size: 12.5px; color: #cfcfca; font-weight: 600; margin-left: auto; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 18px 16px 50px; }
  .hero { border-radius: 18px; overflow: hidden; position: relative; height: 170px; background: var(--soft); }
  .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.58), rgba(0,0,0,.05) 60%); }
  .hero .cap { position: absolute; left: 18px; right: 18px; bottom: 15px; color: #fff; z-index: 1; text-shadow: 0 1px 10px rgba(0,0,0,.45); }
  .hero .cap .pill { display: inline-block; background: var(--green); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; margin-bottom: 8px; }
  .hero .cap b { display: block; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .hero .cap span { display: block; font-size: 12.5px; opacity: .95; margin-top: 3px; }
  .intro { font-size: 12.5px; color: #2f6b50; background: var(--green-light); border-radius: 12px; padding: 12px 14px; margin-top: 14px; line-height: 1.65; }
  .toprow { display: flex; align-items: center; justify-content: space-between; margin: 20px 2px 0; }
  .toprow .t { font-size: 13px; color: var(--gray); font-weight: 600; }
  .reroll { border: 1.5px solid var(--line); background: #fff; color: var(--ink); font-weight: 700; font-size: 13px; border-radius: 10px; padding: 9px 14px; cursor: pointer; }
  .reroll:active { background: var(--soft); }

  .course { border: 1px solid var(--line); background: #fff; border-radius: 18px; box-shadow: 0 2px 14px rgba(31,30,29,.04); padding: 15px; margin-top: 14px; }
  .course .ctitle { font-size: 15.5px; font-weight: 800; }
  .course .csub { font-size: 12px; color: var(--gray); margin-top: 2px; margin-bottom: 4px; }
  .stop { display: flex; gap: 11px; padding: 10px 0; border-top: 1px solid var(--line); }
  .stop:first-of-type { border-top: 0; }
  .stop .ph { width: 64px; height: 64px; border-radius: 10px; object-fit: cover; flex: 0 0 auto; }
  .stop .ico { width: 64px; height: 64px; border-radius: 10px; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 26px; flex: 0 0 auto; }
  .stop .body { flex: 1; min-width: 0; }
  .stop .kind { font-size: 11px; font-weight: 700; color: var(--green-deep); }
  .stop .nm { font-weight: 800; font-size: 14.5px; }
  .stop .ct { font-size: 11.5px; color: var(--gray); margin-top: 1px; }
  .stop .note { font-size: 12px; color: #3a3937; margin-top: 4px; line-height: 1.55; }
  .stop .lk { font-size: 12px; color: var(--ink); text-decoration: none; border: 1px solid var(--line); border-radius: 8px; padding: 4px 9px; display: inline-block; margin-top: 6px; font-weight: 600; }
  footer { text-align: center; margin-top: 30px; font-size: 12px; color: var(--gray); }
  footer a { color: var(--green-deep); font-weight: 600; }
</style>
</head>
<body>
<div class="topbar"><span class="wm">mangrove</span><span class="pg">고성 · 트립 코스</span></div>
<div class="wrap">
  <div class="hero">
    <img src="assets/goseong-hero-7.webp" alt="고성">
    <div class="cap"><span class="pill">CA 강력추천만</span><b>✨ 강추 코스 조합</b><span>CA가 진짜 추천하는 곳들로 만든 반나절 코스</span></div>
  </div>
  <div class="intro">💚 CA가 직접 가보고 강력 추천한 곳들만 모아, 동선 맞춰 반나절 코스로 조합했어요. 마음에 안 들면 <b>다른 조합</b>을 눌러보세요!</div>

  <div class="toprow"><span class="t">오늘의 추천 코스</span><button class="reroll" id="reroll">🔄 다른 조합</button></div>
  <div id="courses"></div>

  <footer>맹그로브 고성 · <a href="index.html">← 지금 갈만한 곳으로</a></footer>
</div>

<script src="places.js?v=14"></script>
<script>
  const P = typeof PLACES !== 'undefined' ? PLACES : [];
  const walk = d => d == null ? '' : (d <= 1.2 ? '🚶 ' + Math.max(3, Math.round(d*15)) + '분' : '🚗 ' + (Math.round(d/50*60)+3) + '분');
  function naver(q) { return 'https://search.naver.com/search.naver?query=' + encodeURIComponent(q + ' 고성'); }
  const PICK = P.filter(p => p.ca && !p.to);
  const meals = PICK.filter(p => p.t === '식사');
  const cafes = PICK.filter(p => p.t === '카페');
  const bars  = PICK.filter(p => p.t === '술집');
  // 명소(코스 마무리용) — 강추 술집이 없을 때/낮 코스
  const LANDS = [
    { n: '교암해변', d: '맹그로브 앞바다 산책', z: '도보' },
    { n: '천학정', d: '바다 절벽 정자, 일출·일몰 명소', z: '도보' },
    { n: '청간정', d: '산·들·바다를 함께 보는 관동팔경', z: '고성' },
    { n: '능파대', d: '파도가 바위에 부딪히는 돌섬', z: '고성' },
    { n: '송지호 둘레길', d: '자전거로 한 바퀴 좋은 호수', z: '고성' },
    { n: '왕곡마을', d: '영화 동주의 한옥마을', z: '고성' },
  ];
  const ZONE_LABEL = { '도보': '걸어서 즐기는 반나절', '고성': '고성 반나절 드라이브', '속초': '속초 나들이' };
  function shuffle(a) { a = a.slice(); for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function near(pool, zone, used) { // 같은 zone 우선, 없으면 아무거나 (used 제외)
    const av = pool.filter(p => !used.has(p.n));
    const same = av.filter(p => p.z === zone);
    const arr = shuffle(same.length ? same : av);
    return arr[0] || null;
  }

  function stopHTML(p, kind, icon) {
    if (!p) return '';
    if (p.land) return `<div class="stop"><div class="ico">${icon}</div><div class="body">
      <div class="kind">${kind}</div><div class="nm">${p.n}</div><div class="note">${p.d}</div>
      <a class="lk" href="${naver(p.n)}" target="_blank" rel="noopener">네이버 지도 →</a></div></div>`;
    return `<div class="stop">${p.img ? `<img class="ph" src="${p.img}" loading="lazy" alt="">` : `<div class="ico">${icon}</div>`}
      <div class="body"><div class="kind">${kind}</div><div class="nm">${p.n}</div>
      <div class="ct">${p.c} · ${walk(p.d)}${p.rv ? ' · ★ ' + p.rv[0] : ''}</div>
      ${p.note ? `<div class="note">💬 ${p.note}</div>` : ''}
      <a class="lk" href="${p.u || naver(p.n)}" target="_blank" rel="noopener">네이버 지도 →</a></div></div>`;
  }

  function build() {
    const used = new Set();
    const mealPick = shuffle(meals).slice(0, 3);
    const out = [];
    mealPick.forEach((m, i) => {
      used.add(m.n);
      const cafe = near(cafes, m.z, used); if (cafe) used.add(cafe.n);
      let third, thirdKind, thirdIcon;
      const bar = near(bars, m.z, used);
      if (bar && Math.random() > 0.35) { third = bar; thirdKind = '🍻 한잔'; thirdIcon = '🍻'; used.add(bar.n); }
      else { const l = shuffle(LANDS.filter(x => x.z === m.z || x.z === '도보'))[0] || shuffle(LANDS)[0]; third = { ...l, land: true }; thirdKind = '🌅 산책·명소'; thirdIcon = '🌅'; }
      out.push({ label: '코스 ' + (i+1), sub: ZONE_LABEL[m.z] || '고성 반나절',
        html: stopHTML(m, '🍽 밥', '🍽') + (cafe ? stopHTML(cafe, '☕ 카페', '☕') : '') + stopHTML(third, thirdKind, thirdIcon) });
    });
    document.getElementById('courses').innerHTML = out.map(c =>
      `<div class="course"><div class="ctitle">${c.label}</div><div class="csub">${c.sub}</div>${c.html}</div>`).join('');
  }
  document.getElementById('reroll').addEventListener('click', build);
  build();
</script>
</body>
</html>
