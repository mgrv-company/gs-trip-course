<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>트립 코스 · 가게 관리 (어드민)</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/favicon-180.png">
<style>
  :root {
    --green: #1d5c4f; --green-light: #e8f2ef; --sand: #faf7f2;
    --ink: #243230; --gray: #7a8a86; --line: #e3e0d8;
    --red: #b03a3a; --red-light: #fdeaea;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Malgun Gothic', sans-serif;
    background: var(--sand); color: var(--ink); line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 80px; }
  header { padding: 14px 0 6px; }
  header .badge {
    display: inline-block; background: #00b453; color: #fff;
    font-size: 11px; letter-spacing: 1px; padding: 3px 10px; border-radius: 99px;
  }
  header h1 { font-size: 21px; margin: 10px 0 4px; letter-spacing: -0.5px; }
  header p { color: var(--gray); font-size: 13px; }

  .card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-top: 14px; }
  .card h2 { font-size: 15px; margin-bottom: 10px; }
  label { display: block; font-size: 12.5px; color: var(--gray); margin: 10px 0 4px; }
  input[type=text], input[type=password], select, textarea {
    width: 100%; border: 1.5px solid var(--line); border-radius: 10px;
    padding: 10px 12px; font-size: 14px; font-family: inherit; background: #fff; color: var(--ink);
  }
  textarea { resize: vertical; min-height: 48px; }
  .btn {
    border: 0; border-radius: 10px; padding: 11px 16px; font-size: 14px;
    font-weight: 700; cursor: pointer; background: var(--green); color: #fff;
  }
  .btn.ghost { background: #fff; border: 1.5px solid var(--line); color: var(--ink); font-weight: 600; }
  .btn.sm { padding: 6px 10px; font-size: 12.5px; border-radius: 8px; }
  .btn:disabled { opacity: .5; cursor: default; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .msg { font-size: 13px; padding: 10px 12px; border-radius: 10px; margin-top: 10px; display: none; }
  .msg.show { display: block; }
  .msg.ok { background: var(--green-light); color: var(--green); }
  .msg.err { background: var(--red-light); color: var(--red); }
  .msg.info { background: #fff7e8; color: #9a6b2f; }

  .tabs { display: flex; gap: 8px; margin-top: 16px; }
  .tab { flex: 1; text-align: center; padding: 10px; border: 1.5px solid var(--line); border-radius: 10px; background: #fff; cursor: pointer; font-size: 14px; font-weight: 600; }
  .tab.on { border-color: var(--green); background: var(--green-light); color: var(--green); }

  .listitem { border: 1px solid var(--line); border-radius: 12px; padding: 11px 12px; margin-top: 10px; }
  .listitem.excluded { opacity: .55; }
  .listitem .nm { font-weight: 800; font-size: 14.5px; }
  .listitem .ct { font-size: 12px; color: var(--gray); margin-top: 1px; }
  .listitem .note { font-size: 12px; color: #9a6b2f; margin-top: 4px; }
  .listitem .acts { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 9px; }
  .pill { font-size: 10.5px; padding: 2px 7px; border-radius: 99px; font-weight: 700; vertical-align: 1px; margin-left: 4px; }
  .pill.man { background: #eef1ff; color: #4a5bd0; }
  .pill.pick { background: var(--green-light); color: var(--green); }
  .pill.rsv { background: var(--red-light); color: var(--red); }
  .pill.exc { background: #eee; color: #777; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { border: 1.5px solid var(--line); border-radius: 99px; padding: 5px 11px; font-size: 12.5px; cursor: pointer; user-select: none; }
  .chip.on { border-color: var(--green); background: var(--green-light); color: var(--green); font-weight: 700; }

  .savebar {
    position: fixed; left: 0; right: 0; bottom: 0; background: #fff;
    border-top: 1px solid var(--line); padding: 12px 16px; display: none;
  }
  .savebar.show { display: block; }
  .savebar .inner { max-width: 560px; margin: 0 auto; display: flex; gap: 10px; align-items: center; }
  .savebar .cnt { font-size: 13px; color: var(--gray); flex: 1; }
  .hidden { display: none !important; }
  .small { font-size: 11.5px; color: var(--gray); margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="badge">ADMIN</span>
    <h1>트립 코스 · 가게 관리</h1>
    <p>가게를 빼거나(제외) 예약필수·강추·메모를 달고, 새 가게를 추가합니다.</p>
  </header>

  <!-- 토큰 게이트 -->
  <div class="card" id="tokenCard">
    <h2>GitHub 토큰</h2>
    <p class="small">이 저장소(gs-trip-course)에 쓰기 권한이 있는 fine-grained 토큰을 넣어주세요. <b>토큰은 이 브라우저에만 저장</b>되고 서버로 보내지지 않아요.</p>
    <label>토큰 (github_pat_...)</label>
    <input type="password" id="tokenInput" placeholder="github_pat_... 또는 ghp_...">
    <div class="row" style="margin-top:10px">
      <button class="btn" id="tokenSave">저장하고 불러오기</button>
      <button class="btn ghost" id="tokenClear">토큰 지우기</button>
    </div>
    <div class="msg" id="tokenMsg"></div>
  </div>

  <div id="app" class="hidden">
    <div class="msg info show" id="loadMsg">불러오는 중…</div>

    <div class="tabs">
      <div class="tab on" data-tab="manage">가게 관리</div>
      <div class="tab" data-tab="add">새 가게 추가</div>
    </div>

    <!-- 관리 탭 -->
    <div id="tabManage">
      <div class="card">
        <input type="text" id="search" placeholder="가게 이름·카테고리 검색…">
        <div class="small" id="countLine"></div>
      </div>
      <div id="list"></div>
    </div>

    <!-- 추가 탭 -->
    <div id="tabAdd" class="hidden">
      <div class="card">
        <h2>새 가게 추가</h2>
        <p class="small">네이버 저장 리스트에 없는 가게를 직접 넣을 때 사용해요. 매주 자동 갱신에도 지워지지 않습니다. (영업시간·평점 등은 자동수집되지 않으니 카드에 "방문 전 확인"으로 표시됩니다.)</p>
        <label>이름 *</label>
        <input type="text" id="f_name" placeholder="예: 고성 한치횟집">
        <label>종류 *</label>
        <select id="f_type">
          <option value="식사">식사 (맛집)</option>
          <option value="카페">카페</option>
          <option value="술집">술집</option>
          <option value="쇼핑·소품">쇼핑·소품</option>
        </select>
        <label>세부 카테고리 (선택) — 카드에 표시될 한 줄</label>
        <input type="text" id="f_cat" placeholder="예: 해산물,회 (비우면 종류로 표시)">
        <label>구역 *</label>
        <select id="f_zone">
          <option value="도보권">도보권</option>
          <option value="고성권(차 10~15분)">고성권(차 10~15분)</option>
          <option value="속초권(차 20~35분)">속초권(차 20~35분)</option>
        </select>
        <label>주소 (선택)</label>
        <input type="text" id="f_addr" placeholder="예: 강원 고성군 토성면 …">
        <label>식성 태그 (선택)</label>
        <div class="chips" id="f_food"></div>
        <label>분위기 (선택)</label>
        <div class="chips" id="f_vibe"></div>
        <label>네이버 지도 링크 (선택)</label>
        <input type="text" id="f_naver" placeholder="https://map.naver.com/p/entry/place/...">
        <label>대표 사진 URL (선택)</label>
        <input type="text" id="f_thumb" placeholder="https://...jpg">
        <div class="row" style="margin-top:14px">
          <button class="btn" id="addBtn">목록에 추가</button>
        </div>
        <div class="msg" id="addMsg"></div>
      </div>
    </div>
  </div>
</div>

<!-- 하단 저장 바 -->
<div class="savebar" id="savebar">
  <div class="inner">
    <span class="cnt" id="saveCnt"></span>
    <button class="btn ghost sm" id="reloadBtn">되돌리기</button>
    <button class="btn" id="saveBtn">저장 &amp; 사이트 반영</button>
  </div>
</div>

<script>
// ── 설정 ──────────────────────────────────────────
const OWNER = 'yjan-max', REPO = 'gs-trip-course', BRANCH = 'main';
const TOKEN_KEY = 'gsAdminToken';
const FOOD_TAGS = ['고기','면','분식','아시안','양식','일식','한식','해산물'];
const VIBE_TAGS = ['감성','로컬·노포','무난'];
const DIST_BY_ZONE = { '도보권': 0.8, '고성권(차 10~15분)': 10, '속초권(차 20~35분)': 25 };

const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));

// ── 한글 안전 base64 (GitHub API는 base64 content) ──
function b64decode(b64) {
  const bin = atob(b64.replace(/\s/g, ''));
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}
function b64encode(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}

let token = localStorage.getItem(TOKEN_KEY) || '';

// 상태
let tagged = [];          // 네이버 자동수집 가게 (읽기전용 base)
let manual = [];          // 직접 추가 가게 (편집·삭제 가능)
let overrides = {};       // 이름 → {reserve,pick,exclude,note} (+ _설명 보존)
let shaOverrides = null, shaManual = null;
let dirty = { ov: false, man: false };

// ── GitHub API helpers ─────────────────────────────
async function ghGet(path) {
  const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`, {
    headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' }
  });
  if (r.status === 404) return { content: null, sha: null };
  if (!r.ok) throw new Error(`불러오기 실패 (${r.status}) — 토큰/권한을 확인하세요`);
  const j = await r.json();
  return { content: b64decode(j.content), sha: j.sha };
}
async function ghPut(path, text, sha, message) {
  const body = { message, content: b64encode(text), branch: BRANCH };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`저장 실패 (${r.status}) ${t.slice(0, 200)}`);
  }
  return (await r.json()).content.sha;
}

// ── 데이터 로드 ─────────────────────────────────────
async function loadAll() {
  showMsg('loadMsg', 'info', '불러오는 중…');
  try {
    // places_tagged.json (읽기전용) — API content 1MB 한도 내(약 90KB)
    const t = await ghGet('data/places_tagged.json');
    tagged = JSON.parse(t.content);

    const o = await ghGet('data/overrides.json');
    overrides = o.content ? JSON.parse(o.content) : {};
    shaOverrides = o.sha;

    const m = await ghGet('data/manual_places.json');
    manual = m.content ? JSON.parse(m.content) : [];
    shaManual = m.sha;

    dirty = { ov: false, man: false };
    $('#loadMsg').classList.remove('show');
    render();
    updateSavebar();
  } catch (e) {
    showMsg('loadMsg', 'err', e.message);
  }
}

// ── 렌더 ────────────────────────────────────────────
function allPlaces() {
  // manual 을 위로(직접 추가가 잘 보이게), 그 다음 tagged
  return [
    ...manual.map(p => ({ ...p, _manual: true })),
    ...tagged.map(p => ({ ...p, _manual: false }))
  ];
}

function render() {
  const q = ($('#search').value || '').trim().toLowerCase();
  const items = allPlaces().filter(p => {
    if (!q) return true;
    return (p.name || '').toLowerCase().includes(q) || (p.category || '').toLowerCase().includes(q);
  });
  const total = allPlaces().length;
  const excl = Object.values(overrides).filter(v => v && v.exclude).length;
  $('#countLine').textContent = `전체 ${total}곳 · 직접추가 ${manual.length} · 제외 ${excl} · 검색결과 ${items.length}`;

  const html = items.slice(0, 300).map(p => {
    const ov = overrides[p.name] || {};
    const pills = [];
    if (p._manual) pills.push('<span class="pill man">직접추가</span>');
    if (ov.exclude) pills.push('<span class="pill exc">제외됨</span>');
    if (ov.pick) pills.push('<span class="pill pick">강추</span>');
    if (ov.reserve) pills.push('<span class="pill rsv">예약필수</span>');
    const name = esc(p.name);
    return `<div class="listitem ${ov.exclude ? 'excluded' : ''}">
      <div class="nm">${name}${pills.join('')}</div>
      <div class="ct">${esc(p.type || '')} · ${esc(p.category || '')} · ${esc(p.zone || '')}</div>
      ${ov.note ? `<div class="note">📝 ${esc(ov.note)}</div>` : ''}
      <div class="acts">
        <button class="btn ghost sm" data-act="exclude" data-n="${name}">${ov.exclude ? '↩ 복구' : '✕ 제외'}</button>
        <button class="btn ghost sm" data-act="reserve" data-n="${name}">${ov.reserve ? '✓ 예약필수' : '예약필수'}</button>
        <button class="btn ghost sm" data-act="pick" data-n="${name}">${ov.pick ? '✓ 강추' : '강추'}</button>
        <button class="btn ghost sm" data-act="note" data-n="${name}">메모</button>
        ${p._manual ? `<button class="btn ghost sm" data-act="delman" data-n="${name}" style="color:var(--red)">삭제</button>` : ''}
      </div>
    </div>`;
  }).join('');
  $('#list').innerHTML = html || '<p class="small" style="margin-top:14px">검색 결과가 없어요.</p>';
}

function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

// ── override 토글 ───────────────────────────────────
function setOverride(name, key, value) {
  const o = overrides[name] || {};
  if (value) o[key] = true; else delete o[key];
  if (Object.keys(o).filter(k => k !== '_설명').length === 0) delete overrides[name];
  else overrides[name] = o;
  dirty.ov = true;
  render(); updateSavebar();
}

document.addEventListener('click', e => {
  const b = e.target.closest('[data-act]');
  if (!b) return;
  const name = b.dataset.n, act = b.dataset.act;
  const ov = overrides[name] || {};
  if (act === 'exclude') setOverride(name, 'exclude', !ov.exclude);
  else if (act === 'reserve') setOverride(name, 'reserve', !ov.reserve);
  else if (act === 'pick') setOverride(name, 'pick', !ov.pick);
  else if (act === 'note') {
    const cur = ov.note || '';
    const v = prompt(`"${name}" 카드에 표시할 메모 (비우면 삭제):`, cur);
    if (v === null) return;
    const o = overrides[name] || {};
    if (v.trim()) o.note = v.trim(); else delete o.note;
    if (Object.keys(o).filter(k => k !== '_설명').length === 0) delete overrides[name];
    else overrides[name] = o;
    dirty.ov = true; render(); updateSavebar();
  } else if (act === 'delman') {
    if (!confirm(`직접 추가한 "${name}"를 목록에서 삭제할까요?`)) return;
    manual = manual.filter(m => m.name !== name);
    dirty.man = true; render(); updateSavebar();
  }
});

$('#search').addEventListener('input', render);

// ── 탭 ──────────────────────────────────────────────
$$('.tab').forEach(t => t.addEventListener('click', () => {
  $$('.tab').forEach(x => x.classList.remove('on'));
  t.classList.add('on');
  const tab = t.dataset.tab;
  $('#tabManage').classList.toggle('hidden', tab !== 'manage');
  $('#tabAdd').classList.toggle('hidden', tab !== 'add');
}));

// ── 추가 폼 ─────────────────────────────────────────
function buildChips(containerSel, tags) {
  $(containerSel).innerHTML = tags.map(t => `<span class="chip" data-v="${esc(t)}">${esc(t)}</span>`).join('');
  $$(`${containerSel} .chip`).forEach(c => c.addEventListener('click', () => c.classList.toggle('on')));
}
function chosenChips(containerSel) {
  return $$(`${containerSel} .chip.on`).map(c => c.dataset.v);
}

$('#addBtn').addEventListener('click', () => {
  const name = $('#f_name').value.trim();
  if (!name) { showMsg('addMsg', 'err', '이름은 필수예요.'); return; }
  if (allPlaces().some(p => p.name === name)) { showMsg('addMsg', 'err', '같은 이름의 가게가 이미 있어요.'); return; }
  const type = $('#f_type').value;
  const zone = $('#f_zone').value;
  const cat = $('#f_cat').value.trim() || type;
  const place = {
    name, type, list: '수동', category: cat,
    food: chosenChips('#f_food'), vibe: chosenChips('#f_vibe'),
    zone, dist_km: DIST_BY_ZONE[zone] || 10,
    address: $('#f_addr').value.trim(),
    lat: null, lng: null,
    sid: 'm' + Date.now(),
    thumb: $('#f_thumb').value.trim(),
    naver: $('#f_naver').value.trim(),
    guessed: false
  };
  manual.push(place);
  dirty.man = true;
  // 폼 리셋
  $('#f_name').value = ''; $('#f_cat').value = ''; $('#f_addr').value = '';
  $('#f_naver').value = ''; $('#f_thumb').value = '';
  $$('#f_food .chip, #f_vibe .chip').forEach(c => c.classList.remove('on'));
  showMsg('addMsg', 'ok', `"${name}" 추가됨 — 아래 저장 버튼을 눌러 사이트에 반영하세요.`);
  render(); updateSavebar();
});

// ── 저장 ────────────────────────────────────────────
function updateSavebar() {
  const n = (dirty.ov ? 1 : 0) + (dirty.man ? 1 : 0);
  $('#savebar').classList.toggle('show', n > 0);
  if (n > 0) {
    const parts = [];
    if (dirty.ov) parts.push('가게 관리(제외·예약·강추·메모)');
    if (dirty.man) parts.push('직접 추가/삭제');
    $('#saveCnt').textContent = '변경: ' + parts.join(' + ');
  }
}

$('#saveBtn').addEventListener('click', async () => {
  $('#saveBtn').disabled = true;
  try {
    if (dirty.ov) {
      const text = JSON.stringify(overrides, null, 2) + '\n';
      shaOverrides = await ghPut('data/overrides.json', text, shaOverrides, 'admin: update overrides.json');
      dirty.ov = false;
    }
    if (dirty.man) {
      const text = JSON.stringify(manual, null, 2) + '\n';
      shaManual = await ghPut('data/manual_places.json', text, shaManual, 'admin: update manual_places.json');
      dirty.man = false;
    }
    updateSavebar();
    showMsg('loadMsg', 'ok', '저장 완료! GitHub Actions가 1~2분 안에 사이트를 자동 갱신해요. 잠시 뒤 새로고침하면 반영됩니다.');
    $('#loadMsg').classList.add('show');
  } catch (e) {
    showMsg('loadMsg', 'err', e.message + ' — 다른 곳에서 동시에 수정됐다면 [되돌리기]로 다시 불러오세요.');
    $('#loadMsg').classList.add('show');
  } finally {
    $('#saveBtn').disabled = false;
  }
});

$('#reloadBtn').addEventListener('click', () => {
  if (dirty.ov || dirty.man) {
    if (!confirm('저장하지 않은 변경이 있어요. 버리고 다시 불러올까요?')) return;
  }
  loadAll();
});

// ── 토큰 게이트 ─────────────────────────────────────
function showMsg(id, kind, text) {
  const el = $('#' + id);
  el.className = 'msg show ' + kind;
  el.textContent = text;
}
function enterApp() {
  $('#app').classList.remove('hidden');
  buildChips('#f_food', FOOD_TAGS);
  buildChips('#f_vibe', VIBE_TAGS);
  loadAll();
}
$('#tokenSave').addEventListener('click', () => {
  const v = $('#tokenInput').value.trim();
  if (!v) { showMsg('tokenMsg', 'err', '토큰을 입력하세요.'); return; }
  token = v;
  localStorage.setItem(TOKEN_KEY, v);
  showMsg('tokenMsg', 'ok', '저장됨. 불러오는 중…');
  enterApp();
});
$('#tokenClear').addEventListener('click', () => {
  localStorage.removeItem(TOKEN_KEY);
  token = '';
  $('#tokenInput').value = '';
  $('#app').classList.add('hidden');
  showMsg('tokenMsg', 'info', '토큰을 지웠어요. 이 브라우저에서 더는 수정할 수 없습니다.');
});

// 시작: 토큰이 이미 저장돼 있으면 바로 입장
if (token) { $('#tokenInput').value = token; enterApp(); }
</script>
</body>
</html>
