<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맹그로브 고성 · 해수욕장 지도 (테스트)</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'">
<style>
  :root { --green: #00b453; --green-deep: #0a7a3c; --green-light: #eafdf1; --ink: #1f1e1d; --gray: #76776c; --line: #ececea; --bg: #f6f5f2; --soft: #edece9; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', system-ui, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.55; }
  .topbar { position: sticky; top: 0; z-index: 20; background: var(--ink); color: #fff; display: flex; align-items: center; gap: 10px; padding: 14px 16px; }
  .topbar .wm { font-weight: 800; font-size: 16px; }
  .topbar .pg { font-size: 12.5px; color: #cfcfca; font-weight: 600; margin-left: auto; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 16px 16px 40px; }
  .notice { font-size: 12px; color: #8a6a14; background: #fff3cd; border-radius: 10px; padding: 10px 13px; margin-bottom: 14px; line-height: 1.6; }
  h2 { font-size: 16px; font-weight: 800; margin-bottom: 8px; }
  #debugLine { font-size: 11.5px; color: #c0392b; font-weight: 700; margin-bottom: 8px; white-space: pre-wrap; }

  .mapwrap { position: relative; border-radius: 16px; overflow: hidden; height: 420px; background: #cfe8ee;
    border: 1px solid var(--line); touch-action: none; cursor: grab; }
  .mapwrap.dragging { cursor: grabbing; }
  .stage { position: absolute; left: 0; top: 0; transform-origin: 0 0; width: 688px; height: 1551px; }
  #pinsHost { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
  .stage img { display: block; width: 688px; height: 1551px; user-select: none; -webkit-user-drag: none; }

  .zoomctl { position: absolute; right: 10px; top: 10px; display: flex; flex-direction: column; gap: 6px; z-index: 5; }
  .zoomctl button { width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--line); background: #fff;
    color: var(--ink); font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.12); }
  .zoomctl button:active { background: var(--soft); }
  .resetbtn { position: absolute; left: 10px; top: 10px; z-index: 5; background: #fff; border: 1px solid var(--line);
    border-radius: 9px; padding: 6px 10px; font-size: 11px; font-weight: 700; color: var(--ink); cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,.12); }
  .legend { position: absolute; left: 10px; bottom: 10px; z-index: 5; background: rgba(255,255,255,.92);
    border-radius: 9px; padding: 6px 10px; font-size: 10.5px; color: var(--ink); display: flex; align-items: center;
    gap: 6px; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
  .attrib { position: absolute; right: 6px; bottom: 4px; z-index: 5; font-size: 8.5px; color: #333; background: rgba(255,255,255,.7);
    padding: 1px 5px; border-radius: 4px; }
  .legend .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--ink); display: inline-block; }

  .pin { position: absolute; cursor: pointer; }
  .pin .core { border-radius: 50%; background: var(--green); border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,.3);
    display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .pin.selected .core { border-color: var(--ink); border-width: 3px; background: var(--green-deep); }
  .pin .badge { position: absolute; top: -5px; right: -5px; background: #d64545; color: #fff; font-size: 8.5px;
    font-weight: 800; border-radius: 99px; min-width: 15px; height: 15px; display: flex; align-items: center; justify-content: center; padding: 0 3px; }
  .mg-pin { position: absolute; width: 16px; height: 16px; border-radius: 50%; background: var(--ink); border: 2px solid #fff;
    box-shadow: 0 2px 5px rgba(0,0,0,.3); transform: translate(-50%,-50%); }

  .infopanel { margin-top: 14px; }
  .empty-hint { text-align: center; color: var(--gray); font-size: 12.5px; padding: 20px; border: 1.5px dashed var(--line); border-radius: 14px; }
  .beachcard { background: #fff; border: 1px solid var(--line); border-radius: 18px; overflow: hidden; box-shadow: 0 6px 18px rgba(31,30,29,.08); }
  .beachcard .ph { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--soft); }
  .beachcard .noph { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; background: var(--soft); font-size: 30px; color: var(--gray); }
  .beachcard .bd { padding: 14px 16px; }
  .beachcard .nm { font-weight: 800; font-size: 17px; }
  .beachcard .meta { font-size: 12.5px; color: var(--gray); margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
  .beachcard .meta .rv { color: var(--ink); font-weight: 700; }
  .beachcard .meta .drive { font-weight: 700; color: var(--green-deep); }
  .beachcard .links { margin-top: 12px; }
  .beachcard .links a { font-size: 12.5px; color: var(--ink); text-decoration: none; border: 1px solid var(--line); border-radius: 9px; padding: 8px 13px; display: inline-block; font-weight: 600; }
  .nearby { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
  .nearby .lbl { font-size: 11px; font-weight: 700; color: var(--gray); margin-bottom: 8px; }
  .nearby .chips { display: flex; gap: 7px; flex-wrap: wrap; }
  .nearby .chip { border: 1px solid var(--line); border-radius: 99px; padding: 6px 11px; font-size: 11.5px; font-weight: 600; cursor: pointer; background: #fff; color: var(--ink); }
  .nearby .chip:hover { border-color: var(--green); background: var(--green-light); }
</style>
</head>
<body>
<div class="topbar"><span class="wm">mangrove</span><span class="pg">고성 · 해수욕장 지도 (테스트 페이지)</span></div>
<div class="wrap">
  <div class="notice">⚠️ 테스트 페이지예요 — 실제 홈 화면엔 아직 연결 안 됐고, 어디에도 링크 안 걸려 있어요. 확인 후 문제없으면 홈에 반영할게요.<br>
  이번엔 실시간 지도 서버 대신, 실제 OpenStreetMap 지도를 미리 이미지로 만들어 넣었어요(실시간 접속 문제 없음).</div>
  <h2>🏖 고성 해수욕장</h2>
  <div id="debugLine"></div>
  <div class="mapwrap" id="mapWrap">
    <button class="resetbtn" id="resetBtn">전체보기</button>
    <div class="zoomctl">
      <button id="zoomIn" aria-label="확대">+</button>
      <button id="zoomOut" aria-label="축소">−</button>
    </div>
    <div class="stage" id="stage">
      <img id="mapImg" src="assets/map/goseong-static-map.png" alt="고성·속초 해안 지도">
      <div id="pinsHost"></div>
    </div>
    <div class="legend"><span class="dot"></span>맹그로브 고성</div>
    <div class="attrib">지도 데이터 &copy; OpenStreetMap contributors</div>
  </div>
  <div class="infopanel" id="infoPanel"></div>
</div>

<script src="places.js?v=17"></script>
<script src="beach-map-test.js"></script>
</body>
</html>
