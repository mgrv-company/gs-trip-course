name: rebuild places.js

# 어드민/주기갱신이 data/ 안의 데이터를 바꾸면 자동으로 build_places.py 를 돌려
# places.js 를 다시 생성·커밋한다. places.js 는 data/ 밖이라 재트리거 루프가 없다.
on:
  push:
    branches: [main]
    paths:
      - 'data/overrides.json'
      - 'data/manual_places.json'
      - 'data/places_tagged.json'
      - 'data/hours.json'
      - 'data/extras.json'
      - 'data/menus.json'
      - 'data/reviews_stats.json'
      - 'data/photos.json'
      - 'data/build_places.py'
  workflow_dispatch: {}          # 어드민 "재빌드" 버튼 (Worker가 GH_TOKEN으로 호출)
  schedule:
    - cron: '0 22 * * *'         # 매일 07:00 KST — 어드민 편집(D1)을 스냅샷에 자동 반영 (PC 불필요)

permissions:
  contents: write

concurrency:
  group: rebuild-places
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 어드민 편집(D1)을 먼저 받아와 스냅샷 기준을 최신으로 (실패해도 기존 파일로 빌드 진행)
      - name: Sync admin edits from D1
        continue-on-error: true
        run: |
          curl -sf --max-time 20 https://gs-trip-admin.mangrove-goseong.workers.dev/public/export -o /tmp/export.json
          jq '.overrides' /tmp/export.json > data/overrides.json
          jq '.manual_places' /tmp/export.json > data/manual_places.json
          echo "동기화: overrides $(jq '.overrides | length' /tmp/export.json)건 · 직접추가 $(jq '.manual_places | length' /tmp/export.json)건"

      - name: Rebuild places.js
        run: python data/build_places.py

      - name: Commit if changed
        run: |
          git config user.name "gs-trip-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- places.js data/overrides.json data/manual_places.json; then
            echo "변경 없음 — 커밋 생략"
          else
            git add places.js data/overrides.json data/manual_places.json
            git commit -m "chore: rebuild places.js (auto)"
            git push
          fi
