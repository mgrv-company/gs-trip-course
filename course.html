<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맹그로브 고성 · 바다 + 막국수 코스</title>
<meta name="description" content="맹그로브 고성 도보권에서 즐기는 바다 + 막국수 반나절 코스">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00b453; --green-deep: #0a7a3c; --green-light: #eafdf1;
    --ink: #1f1e1d; --gray: #76776c; --line: #ececea; --bg: #f6f5f2; --soft: #edece9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased; }
  .topbar { position: sticky; top: 0; z-index: 20; background: var(--ink); color: #fff; display: flex; align-items: center; gap: 10px; padding: 14px 16px; }
  .topbar .wm { font-weight: 800; font-size: 16px; letter-spacing: -0.3px; }
  .topbar .pg { font-size: 12.5px; color: #cfcfca; font-weight: 600; margin-left: auto; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 18px 16px 50px; }

  .hero { border-radius: 18px; overflow: hidden; position: relative; height: 180px; background: var(--soft); }
  .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,.05) 60%); }
  .hero .cap { position: absolute; left: 18px; right: 18px; bottom: 15px; color: #fff; z-index: 1; text-shadow: 0 1px 10px rgba(0,0,0,.45); }
  .hero .cap .pill { display: inline-block; background: var(--green); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; margin-bottom: 8px; }
  .hero .cap b { display: block; font-size: 25px; font-weight: 800; letter-spacing: -0.5px; }
  .hero .cap span { display: block; font-size: 12.5px; opacity: .95; margin-top: 3px; }

  .intro { font-size: 12.5px; color: #2f6b50; background: var(--green-light); border-radius: 12px; padding: 12px 14px; margin-top: 14px; line-height: 1.6; }

  .step { display: flex; gap: 12px; margin-top: 16px; }
  .step .rail { display: flex; flex-direction: column; align-items: center; flex: 0 0 auto; }
  .step .num { width: 28px; height: 28px; border-radius: 50%; background: var(--ink); color: #fff; font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .step .line { flex: 1; width: 2px; background: var(--line); margin: 4px 0; }
  .step:last-child .line { display: none; }
  .card { flex: 1; background: #fff; border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 2px 12px rgba(31,30,29,.04); display: flex; gap: 12px; padding: 13px; align-items: flex-start; }
  .card .ph { width: 92px; height: 92px; border-radius: 11px; object-fit: cover; flex: 0 0 auto; }
  .card .body { flex: 1; min-width: 0; }
  .card .kind { font-size: 11px; font-weight: 700; color: var(--green-deep); }
  .card .nm { font-weight: 800; font-size: 16px; letter-spacing: -0.2px; margin-top: 1px; }
  .card .ct { font-size: 12px; color: var(--gray); margin-top: 3px; }
  .card .desc { font-size: 12.5px; color: #3a3937; margin-top: 7px; line-height: 1.6; }
  .card .links { margin-top: 9px; }
  .card .links a { font-size: 12.5px; color: var(--ink); text-decoration: none; border: 1px solid var(--line); border-radius: 9px; padding: 7px 11px; display: inline-block; font-weight: 600; }

  footer { text-align: center; margin-top: 30px; font-size: 12px; color: var(--gray); }
  footer a { color: var(--green-deep); font-weight: 600; }
</style>
</head>
<body>
<div class="topbar"><span class="wm">mangrove</span><span class="pg">고성 · 트립 코스</span></div>
<div class="wrap">
  <div class="hero">
    <img src="assets/goseong-hero-3.webp" alt="고성 바다">
    <div class="cap"><span class="pill">CA 추천 코스</span><b>🌊 바다 + 막국수</b><span>맹그로브 도보권에서 즐기는 반나절 코스</span></div>
  </div>
  <div class="intro">🚶 전부 맹그로브에서 걸어갈 수 있어요. 바다 산책 → 막국수 한 그릇 → 바닷가 카페 → 절벽 일몰까지, 천천히 반나절 코스예요.</div>

  <div id="course"></div>

  <footer>맹그로브 고성 · <a href="index.html">← 지금 갈만한 곳으로</a></footer>
</div>

<script src="places.js?v=11"></script>
<script>
  const DAY_NAMES = ['일','월','화','수','목','금','토'];
  const byName = n => (typeof PLACES !== 'undefined' ? PLACES.find(p => p.n === n) : null);
  function walkMin(d) { return d == null ? '' : '🚶 ' + Math.max(3, Math.round(d * 15)) + '분'; }
  function hoursToday(p) {
    if (!p || !p.h) return '';
    const r = p.h[DAY_NAMES[new Date().getDay()]];
    if (r === null) return '오늘 휴무 ⚠️';
    if (!r) return '';
    return '오늘 ' + r.replace('-', '~');
  }
  // 코스 정의: place=가게 이름(places.js 조회) / land=명소(네이버 검색)
  const STOPS = [
    { icon:'🏖', kind:'바다 산책', land:'교암해변', ct:'맹그로브 앞바다 · 도보 5분', desc:'체크인 전후 가볍게. 맹그로브 바로 앞 한적한 바다예요.' },
    { icon:'🍜', kind:'점심', place:'금화정막국수', desc:'담백한 막국수 한 그릇. 도보권이라 부담 없어요.' },
    { icon:'☕', kind:'카페', place:'오엔씨', desc:'식후 바닷가 커피 한 잔.' },
    { icon:'🌅', kind:'산책 마무리', land:'천학정', ct:'바다 절벽 정자 · 도보', desc:'일몰·바다 전망으로 코스 마무리.' },
  ];
  function naver(q) { return 'https://search.naver.com/search.naver?query=' + encodeURIComponent(q + ' 고성'); }
  document.getElementById('course').innerHTML = STOPS.map((s, i) => {
    const p = s.place ? byName(s.place) : null;
    const name = s.place || s.land;
    const img = p && p.img ? `<img class="ph" src="${p.img}" loading="lazy" alt="">` : '';
    const ctParts = [];
    if (p) { ctParts.push(p.c); ctParts.push(walkMin(p.d)); if (p.rv) ctParts.push('★ ' + p.rv[0]); }
    else if (s.ct) ctParts.push(s.ct);
    const hrs = p ? hoursToday(p) : '';
    const menu = p && p.m && p.m.length ? `<div class="ct">🍽 ${p.m.slice(0,2).join(' · ')}</div>` : '';
    const url = (p && p.u) ? p.u : naver(name);
    return `<div class="step">
      <div class="rail"><div class="num">${i+1}</div><div class="line"></div></div>
      <div class="card">
        ${img}
        <div class="body">
          <div class="kind">${s.icon} ${s.kind}</div>
          <div class="nm">${name}</div>
          <div class="ct">${ctParts.filter(Boolean).join(' · ')}${hrs ? ' · ' + hrs : ''}</div>
          ${menu}
          <div class="desc">${s.desc}</div>
          <div class="links"><a href="${url}" target="_blank" rel="noopener">네이버 지도에서 보기 →</a></div>
        </div>
      </div>
    </div>`;
  }).join('');
</script>
</body>
</html>
