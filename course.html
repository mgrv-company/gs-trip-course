<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맹그로브 고성 · 바다 + 막국수 코스</title>
<meta name="description" content="맹그로브 고성 도보권에서 즐기는 바다 + 막국수 반나절 코스">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --green: #00b453; --green-deep: #0a7a3c; --green-light: #eafdf1; --ink: #1f1e1d; --gray: #76776c; --line: #ececea; --bg: #f6f5f2; --soft: #edece9; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased; }
  .topbar { position: sticky; top: 0; z-index: 20; background: var(--ink); color: #fff; display: flex; align-items: center; gap: 10px; padding: 14px 16px; }
  .topbar .wm { font-weight: 800; font-size: 16px; letter-spacing: -0.3px; color: #fff; text-decoration: none; }
  .topbar .pg { font-size: 12.5px; color: #cfcfca; font-weight: 600; margin-left: auto; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 18px 16px 50px; }

  .hero { border-radius: 18px; overflow: hidden; position: relative; height: 180px; background: var(--soft); }
  .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,.05) 60%); }
  .hero .cap { position: absolute; left: 18px; right: 18px; bottom: 15px; color: #fff; z-index: 1; text-shadow: 0 1px 10px rgba(0,0,0,.45); }
  .hero .cap .pill { display: inline-block; background: var(--green); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px; margin-bottom: 8px; }
  .hero .cap b { display: block; font-size: 25px; font-weight: 800; letter-spacing: -0.5px; }
  .hero .cap span { display: block; font-size: 12.5px; opacity: .95; margin-top: 3px; }
  .intro { font-size: 12.5px; color: #2f6b50; background: var(--green-light); border-radius: 12px; padding: 12px 14px; margin-top: 14px; line-height: 1.6; }

  .sec { margin-top: 26px; }
  .sechead { display: flex; align-items: center; gap: 9px; }
  .sechead .num { width: 26px; height: 26px; border-radius: 50%; background: var(--ink); color: #fff; font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
  .sechead h2 { font-size: 16px; font-weight: 800; }
  .sechead .sub { font-size: 12px; color: var(--gray); margin-left: auto; }
  .sort { display: flex; gap: 6px; margin: 9px 0 2px; }
  .sort button { border: 1.5px solid var(--line); background: #fff; color: var(--gray); font-weight: 700; font-size: 12px; border-radius: 99px; padding: 5px 12px; cursor: pointer; }
  .sort button.on { border-color: var(--green); background: var(--green-light); color: var(--green-deep); }

  .card { background: #fff; border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 2px 12px rgba(31,30,29,.04); display: flex; gap: 12px; padding: 13px; align-items: flex-start; margin-top: 10px; }
  .card .ph { width: 88px; height: 88px; border-radius: 11px; object-fit: cover; flex: 0 0 auto; }
  .card .body { flex: 1; min-width: 0; }
  .card .nm { font-weight: 800; font-size: 15.5px; letter-spacing: -0.2px; }
  .card .ct { font-size: 12px; color: var(--gray); margin-top: 3px; }
  .card .info { font-size: 12.5px; color: #3a3937; margin-top: 6px; line-height: 1.6; }
  .card .links { margin-top: 8px; }
  .card .links a { font-size: 12.5px; color: var(--ink); text-decoration: none; border: 1px solid var(--line); border-radius: 9px; padding: 6px 11px; display: inline-block; font-weight: 600; }
  .b { font-size: 10.5px; padding: 2px 7px; border-radius: 99px; font-weight: 700; margin-left: 4px; }
  .b.open { background: var(--green-light); color: var(--green-deep); }
  .b.off { background: #fde8e8; color: #b03a3a; }
  footer { text-align: center; margin-top: 34px; font-size: 12px; color: var(--gray); }
  footer a { color: var(--green-deep); font-weight: 600; }
  footer .homebtn { display: inline-block; background: var(--ink); color: #fff; font-weight: 700; font-size: 13.5px; text-decoration: none; padding: 12px 22px; border-radius: 12px; margin-bottom: 10px; }
  footer .homebtn:active { opacity: .85; }
  footer .addr { font-size: 12px; color: var(--gray); }
</style>
</head>
<body>
<div class="topbar"><a class="wm" href="index.html">mangrove</a><span class="pg">고성 · 트립 코스</span></div>
<div class="wrap">
  <div class="hero">
    <img src="assets/goseong-hero-3.webp" alt="고성 바다">
    <div class="cap"><span class="pill">CA 추천 코스</span><b>🌊 바다 + 막국수</b><span>맹그로브 도보권에서 즐기는 반나절 코스</span></div>
  </div>
  <div class="intro">🚶 전부 맹그로브에서 걸어갈 수 있어요. 바다 산책 → 막국수 한 그릇 → 바닷가 카페 → 절벽 일몰까지, 천천히 반나절 코스예요.</div>

  <div class="sec">
    <div class="sechead"><span class="num">1</span><h2>🏖 바다 산책</h2><span class="sub">도보 5분</span></div>
    <div id="beach"></div>
  </div>

  <div class="sec">
    <div class="sechead"><span class="num">2</span><h2>🍜 막국수 점심</h2></div>
    <div class="sort"><button data-sort="review" class="on">리뷰 많은 순</button><button data-sort="dist">가까운 순</button></div>
    <div id="mk"></div>
  </div>

  <div class="sec">
    <div class="sechead"><span class="num">3</span><h2>☕ 바닷가 카페</h2><span class="sub">영업중 우선</span></div>
    <div id="cafe"></div>
  </div>

  <div class="sec">
    <div class="sechead"><span class="num">4</span><h2>🌅 산책 마무리</h2><span class="sub">도보</span></div>
    <div id="last"></div>
  </div>

  <footer>
    <a class="homebtn" href="index.html">← 홈으로 돌아가기</a>
    <div class="addr">맹그로브 고성</div>
  </footer>
</div>

<script src="places.js?v=12"></script>
<script>
  // ── 조회수·클릭 집계 (트립코스 3종 공용, 어드민 본인 제외) ──
  const ADMIN_API = 'https://gs-trip-admin.mangrove-goseong.workers.dev';
  (function () {
    try {
      if (localStorage.getItem('gstAdminSession')) return;
      const d = new Date();
      const key = 'gsHit:course:' + d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
      if (localStorage.getItem(key)) return;
      localStorage.setItem(key, '1');
      fetch(ADMIN_API + '/view', { method: 'POST', keepalive: true, body: JSON.stringify({ page: 'course' }) }).catch(function () {});
    } catch (e) {}
  })();
  document.addEventListener('click', function (e) {
    const a = e.target.closest('a[data-clk]');
    if (!a) return;
    try { if (localStorage.getItem('gstAdminSession')) return; } catch (e2) {}
    const sid = a.getAttribute('data-sid') || '', name = a.getAttribute('data-name') || '';
    if (!sid && !name) return;
    fetch(ADMIN_API + '/click', { method: 'POST', keepalive: true, body: JSON.stringify({ sid: sid, name: name }) }).catch(function () {});
  }, true);

  const DAY_NAMES = ['일','월','화','수','목','금','토'];
  const P = (typeof PLACES !== 'undefined' ? PLACES : []).filter(p => !p.x);   // 제외(x) 가게 차단
  const toMin = s => { const [h,m] = s.split(':').map(Number); return h*60+m; };
  const walk = d => d == null ? '' : '🚶 ' + Math.max(3, Math.round(d*15)) + '분';
  function openState(p) { // true 영업중 / false 휴무·영업외 / null 미상
    if (!p.h) return null;
    const r = p.h[DAY_NAMES[new Date().getDay()]];
    if (r === null) return false;
    if (!r) return null;
    const [s,e] = r.split('-'); const t = new Date().getHours()*60 + new Date().getMinutes();
    let st = toMin(s), en = toMin(e); if (en <= st) en += 1440;
    return (t >= st && t <= en-20) || (t+1440 >= st && t+1440 <= en-20);
  }
  function hoursToday(p) {
    if (!p || !p.h) return '';
    const r = p.h[DAY_NAMES[new Date().getDay()]];
    if (r === null) return '오늘 휴무';
    if (!r) return '';
    return '오늘 ' + r.replace('-', '~');
  }
  function badge(p) { const o = openState(p); return o === true ? '<span class="b open">● 영업중</span>' : o === false ? '<span class="b off">오늘 휴무</span>' : ''; }
  function naver(q) { return 'https://search.naver.com/search.naver?query=' + encodeURIComponent(q + ' 고성'); }

  function placeCard(p, extra) {
    const rv = p.rv ? ' · ★ ' + p.rv[0] + ' (' + p.rv[1] + ')' : '';
    const menu = p.m && p.m.length ? '<div class="info">🍽 ' + p.m.slice(0,2).join(' · ') + '</div>' : '';
    const h = hoursToday(p);
    return `<div class="card">${p.img ? `<img class="ph" src="${p.img}" loading="lazy" alt="">` : ''}
      <div class="body">
        <div class="nm">${p.n}${badge(p)}</div>
        <div class="ct">${p.c} · ${walk(p.d)}${rv}${h ? ' · ' + h : ''}</div>
        ${menu}${extra || ''}
        <div class="links"><a href="${p.u || naver(p.n)}" target="_blank" rel="noopener" data-clk="1" data-sid="${p.s || ''}" data-name="${p.n || ''}">네이버 지도에서 보기 →</a></div>
      </div></div>`;
  }
  function landCard(name, desc) {
    return `<div class="card"><div class="body"><div class="nm">${name}</div>
      <div class="info">${desc}</div>
      <div class="links"><a href="${naver(name)}" target="_blank" rel="noopener">네이버 지도에서 보기 →</a></div></div></div>`;
  }

  // 1. 해변
  document.getElementById('beach').innerHTML = landCard('교암해변', '맹그로브 바로 앞 한적한 바다. 체크인 전후 가볍게 산책하기 좋아요.');

  // 2. 막국수 — 도보·근거리 우선, 정렬 토글 (오늘 휴무인 곳은 제외)
  const mks = P.filter(p => !p.to && openState(p) !== false && (p.n.includes('막국수') || (p.m||[]).some(m => m.includes('막국수'))));
  function renderMk(sort) {
    const list = mks.slice().sort((a,b) =>
      sort === 'dist' ? (a.d??99) - (b.d??99)
        : ((b.rv ? b.rv[1] : 0) - (a.rv ? a.rv[1] : 0)));
    document.getElementById('mk').innerHTML = list.slice(0, 5).map(p => placeCard(p)).join('') ||
      '<div class="card"><div class="body"><div class="info">막국수집을 찾지 못했어요. 홈의 \'고성 막국수\' 모음에서 확인해보세요.</div></div></div>';
  }
  document.querySelectorAll('.sort button').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.sort button').forEach(x => x.classList.remove('on'));
    b.classList.add('on'); renderMk(b.dataset.sort);
  }));
  renderMk('review');

  // 3. 카페 — 도보권, 오늘 휴무인 곳은 제외하고 가까운 순 최대 3곳
  const cafes = P.filter(p => p.t === '카페' && !p.to && openState(p) !== false && (p.z === '도보' || p.d <= 1.5))
    .sort((a,b) => (a.d??99) - (b.d??99))
    .slice(0, 3);
  document.getElementById('cafe').innerHTML = cafes.map(p => placeCard(p)).join('') ||
    '<div class="card"><div class="body"><div class="info">근처 카페 정보를 찾지 못했어요. 홈의 카페 탭에서 다른 곳을 찾아보세요.</div></div></div>';

  // 4. 마무리
  document.getElementById('last').innerHTML = landCard('천학정', '바다 절벽 위 정자. 일몰·바다 전망으로 코스를 마무리해요.');
</script>
<script src="rating-popup.js?v=2"></script>
</body>
</html>
